<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#241407" />
<title>大狗Tap</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐶</text></svg>" />
<style>
  :root {
    --brown-deep: #241407;
    --brown: #4a2c14;
    --tan: #8b5a2b;
    --gold: #f5c96b;
    --gold-soft: #ffd98a;
    --cream: #fff3d6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--brown-deep);
    color: var(--cream);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: radial-gradient(130% 130% at 50% 15%, #7a4d20 0%, #4a2c14 48%, #221206 100%);
  }

  /* 节拍呼吸光晕（JS 按节拍驱动透明度） */
  #glow {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(60% 60% at 50% 45%, rgba(245, 201, 107, .55), rgba(245, 201, 107, 0) 70%);
    opacity: 0;
    mix-blend-mode: screen;
  }

  /* 分区网格 */
  #grid { position: absolute; inset: 0; display: grid; pointer-events: none; }
  #grid .cell { border: 1px solid rgba(255, 217, 138, .07); }

  /* 大狗 */
  #dog {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    will-change: transform;
  }
  #dog-inner {
    position: relative;
    width: min(56vmin, 400px);
    transition: transform .55s cubic-bezier(.34, 1.9, .64, 1); /* Q弹回弹 */
  }
  #dog-inner img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 18px 40px rgba(0, 0, 0, .45)) drop-shadow(0 0 60px rgba(245, 201, 107, .25));
  }
  #dog-close { transition: opacity .1s linear; }
  #dog-open {
    position: absolute;
    left: 0; top: 0;
    opacity: 0;
    transition: opacity .1s linear;
  }
  #dog-inner.bark { transform: scale(1.1) rotate(-2deg); }
  #dog-inner.bark #dog-open { opacity: 1; }
  #dog-inner.bark #dog-close { opacity: 0; }

  header {
    position: absolute;
    top: max(18px, env(safe-area-inset-top));
    width: 100%;
    text-align: center;
    pointer-events: none;
    z-index: 5;
  }
  header h1 {
    font-size: clamp(20px, 3.4vmin, 30px);
    letter-spacing: .35em;
    font-weight: 800;
    color: var(--gold-soft);
    text-shadow: 0 2px 12px rgba(0, 0, 0, .4);
  }
  header h1 em { font-style: normal; color: var(--cream); }

  #hint {
    position: absolute;
    bottom: max(16px, env(safe-area-inset-bottom));
    width: 100%;
    text-align: center;
    font-size: clamp(11px, 1.8vmin, 14px);
    letter-spacing: .25em;
    color: rgba(255, 243, 214, .5);
    pointer-events: none;
    z-index: 5;
  }

  /* 点击特效层 */
  #fx { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .ripple {
    position: absolute;
    border-radius: 50%;
    border: 3px solid var(--gold);
    box-shadow: 0 0 24px rgba(245, 201, 107, .6), inset 0 0 24px rgba(245, 201, 107, .35);
  }
  .dot {
    position: absolute;
    width: 1.6vmin;
    height: 1.6vmin;
    border-radius: 50%;
    background: var(--gold-soft);
    box-shadow: 0 0 10px rgba(245, 201, 107, .8);
  }
  .float-text {
    position: absolute;
    font-weight: 900;
    color: var(--gold-soft);
    text-shadow: 0 2px 10px rgba(0, 0, 0, .45), 0 0 18px rgba(245, 201, 107, .5);
    font-size: clamp(22px, 4.5vmin, 40px);
    white-space: nowrap;
  }

  /* 开始遮罩（首次点击解锁音频） */
  #overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 2.2vmin;
    align-items: center;
    justify-content: center;
    background: rgba(26, 15, 6, .55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: opacity .5s ease;
    cursor: pointer;
  }
  #overlay.hide { opacity: 0; pointer-events: none; }
  #overlay .title {
    font-size: clamp(34px, 8vmin, 72px);
    font-weight: 900;
    letter-spacing: .18em;
    color: var(--gold-soft);
    text-shadow: 0 4px 24px rgba(0, 0, 0, .5);
  }
  #overlay .title em { font-style: normal; color: var(--cream); }
  #overlay .sub {
    font-size: clamp(13px, 2.4vmin, 18px);
    letter-spacing: .5em;
    color: rgba(255, 243, 214, .85);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .35; } }
</style>
</head>
<body>
  <div id="stage">
    <div id="glow"></div>
    <div id="grid"></div>

    <div id="dog">
      <div id="dog-inner">
        <img id="dog-close" src="Image/dagou_close_mouth.png" alt="大狗" draggable="false" />
        <img id="dog-open" src="Image/dagou_open_mouth.png" alt="" draggable="false" />
      </div>
    </div>

    <header><h1>大狗<em>Tap</em></h1></header>
    <div id="hint">点 击 不 同 分 区 · 狗 叫 会 卡 在 节 拍 上</div>
    <div id="fx"></div>

    <div id="overlay">
      <div class="title">大狗<em>Tap</em></div>
      <div class="sub">点 击 任 意 位 置 开 始</div>
    </div>
  </div>

  <script src="audio-data.js"></script>
  <script src="main.js"></script>
</body>
</html>
